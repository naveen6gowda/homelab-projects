esphome:
  name: bathroom-monitor
  friendly_name: BathRoom Monitor

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:
  level: WARN
  baud_rate: 0

api:
  encryption:
    key: "YOUR_API_ENCRYPTION_KEY"
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: "YOUR_OTA_PASSWORD"

wifi:
  ssid: YOUR_WIFI_SSID
  password: YOUR_WIFI_PASSWORD
  power_save_mode: LIGHT
  output_power: 18dBm
  fast_connect: true
  reboot_timeout: 3min

  ap:
    ssid: "BathRoom-Monitor"
    password: "YOUR_AP_PASSWORD"

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org


i2c:
  sda:
    number: GPIO8
    ignore_strapping_warning: true
  scl:
    number: GPIO9
    ignore_strapping_warning: true
  scan: false
  id: bus_a
  frequency: 100kHz

binary_sensor:
  - platform: status
    name: "System Status"
    id: system_status


sensor:
  - platform: bme280_i2c
    temperature:
      name: "BME280 Temperature"
      id: bme_temp
      oversampling: 1x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 3
    pressure:
      name: "BME280 Pressure"
      id: bme_press
      oversampling: 1x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 3
    humidity:
      name: "BME280 Humidity"
      id: bme_hum
      oversampling: 1x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 3
    address: 0x76
    update_interval: 60s
    i2c_id: bus_a

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_strength
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_sec
    update_interval: 300s

  - platform: adc
    pin: GPIO3
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 60s
    attenuation: 12dB
    filters:
      - multiply: 2.0

  # Import weather temperature from Home Assistant
  - platform: homeassistant
    name: "Outside Temperature"
    id: outside_temp
    entity_id: weather.home
    attribute: temperature

  - platform: homeassistant
    id: outdoor_humidity
    entity_id: weather.forecast_home
    attribute: humidity

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ip_addr
 
# Import weather condition from Home Assistant
  - platform: homeassistant
    name: "Weather Condition"
    id: weather_condition
    entity_id: weather.home

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto@700"
    id: font_medium
    size: 14
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 8
  - file: "gfonts://Roboto@700"
    id: font_large_time
    size: 25
  # Material Design Icons font for weather symbols
  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_mdi_weather
    size: 18
    glyphs:
      - "\U000F0590" # mdi-weather-cloudy
      - "\U000F0591" # mdi-weather-fog
      - "\U000F0592" # mdi-weather-hail
      - "\U000F0593" # mdi-weather-lightning
      - "\U000F067E" # mdi-weather-lightning-rainy
      - "\U000F0594" # mdi-weather-night
      - "\U000F0F31" # mdi-weather-night-partly-cloudy
      - "\U000F0595" # mdi-weather-partly-cloudy
      - "\U000F0596" # mdi-weather-pouring
      - "\U000F0597" # mdi-weather-rainy
      - "\U000F0598" # mdi-weather-snowy
      - "\U000F067F" # mdi-weather-snowy-rainy
      - "\U000F0599" # mdi-weather-sunny
      - "\U000F059D" # mdi-weather-windy

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 0
    contrast: 100%  # Maximum brightness (0% to 100%)
    update_interval: 5s
    i2c_id: bus_a
    lambda: |-
      // Header row - "BathR" and smaller time on same line
      it.printf(64, 0, id(font_medium), TextAlign::TOP_CENTER, "BathR TempMonitor");

      // Draw thin rectangle around the clock area it.rectangle(65, 27, 63, 25);  // x, y, width, height
      
      // Larger time display in blue zone (below yellow header)
      it.strftime(96, 25, id(font_large_time), TextAlign::TOP_CENTER, "%I:%M", id(sntp_time).now());
      
      // Temperature - label and value on same line with different fonts
      if (id(bme_temp).has_state()) {
        it.printf(0, 18, id(font_small), "Temp:");
        it.printf(28, 16, id(font_medium), "%.1fÂ°C", id(bme_temp).state);
      }

      // Date display next to temperature and above rectangle (DD/MM/YYYY format)
      it.strftime(99, 15, id(font_small), TextAlign::TOP_CENTER, "%d.%m  %a", id(sntp_time).now());
      
      // Humidity - label and value on same line with different fonts
      if (id(bme_hum).has_state()) {
        it.printf(0, 35, id(font_small), "Hum:");
        it.printf(26, 33, id(font_medium), "%.1f%%", id(bme_hum).state);
      }
      
      //if (id(bme_press).has_state()) {
      //  it.printf(0, 42, id(font_small), "Press: %.0fhPa", id(bme_press).state);
      //}

      // Weather condition icon using Material Design Icons
      if (id(weather_condition).has_state()) {
        std::string condition = id(weather_condition).state;
        std::string icon = "";
        
        // Map weather conditions to Material Design Icons
        if (condition == "sunny" || condition == "clear-night") {
          icon = "\U000F0599";  // mdi-weather-sunny
        } else if (condition == "cloudy") {
          icon = "\U000F0590";  // mdi-weather-cloudy
        } else if (condition == "partlycloudy") {
          icon = "\U000F0595";  // mdi-weather-partly-cloudy
        } else if (condition == "rainy") {
          icon = "\U000F0597";  // mdi-weather-rainy
        } else if (condition == "pouring") {
          icon = "\U000F0596";  // mdi-weather-pouring
        } else if (condition == "snowy") {
          icon = "\U000F0598";  // mdi-weather-snowy
        } else if (condition == "snowy-rainy") {
          icon = "\U000F067F";  // mdi-weather-snowy-rainy
        } else if (condition == "fog") {
          icon = "\U000F0591";  // mdi-weather-fog
        } else if (condition == "windy") {
          icon = "\U000F059D";  // mdi-weather-windy
        } else if (condition == "lightning") {
          icon = "\U000F0593";  // mdi-weather-lightning
        } else if (condition == "lightning-rainy") {
          icon = "\U000F067E";  // mdi-weather-lightning-rainy
        } else if (condition == "hail") {
          icon = "\U000F0592";  // mdi-weather-hail
        }
        
        if (icon != "") {
          it.printf(41, 48, id(font_mdi_weather), TextAlign::TOP_LEFT, "%s", icon.c_str());
        }
      }
      
      // Outside temperature
      if (id(outside_temp).has_state()) {
        it.printf(69, 52, id(font_small), "%.1fÂ°C", id(outside_temp).state);
      }
      
      if (id(outdoor_humidity).has_state()) {
        it.printf(105, 52, id(font_small), "%.0f%%", id(outdoor_humidity).state);
      }

      if (id(system_status).state) {
        it.printf(0, 54, id(font_tiny), "WiFi: OK");
      } else {
        it.printf(0, 54, id(font_tiny), "WiFi: --");
      }

