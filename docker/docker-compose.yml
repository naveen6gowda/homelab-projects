# Docker Compose — Homelab Services (Debian VM)
# Secrets replaced with environment variables — use a .env file in production
# See README.md for service descriptions

services:

  # ── MANAGEMENT ─────────────────────────────────────────────────────────────

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_SCHEDULE=0 0 2 * * SAT        # every Saturday 2am
      - TZ=Europe/Berlin
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${DISCORD_WEBHOOK_URL}

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  prunemate:
    image: anoniemerd/prunemate:latest
    container_name: prunemate
    ports:
      - "7676:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./pruneMate/logs:/var/log
      - ./pruneMate/config:/config
    environment:
      - PRUNEMATE_TZ=Europe/Berlin
      - PRUNEMATE_TIME_24H=false
    restart: unless-stopped

  # ── DASHBOARD ──────────────────────────────────────────────────────────────

  homer:
    image: b4bz/homer:latest
    container_name: homer
    ports:
      - "3000:8080"
    volumes:
      - ./homer/assets:/www/assets
    environment:
      - INIT_ASSETS=0
    user: "1000:1000"
    restart: unless-stopped

  # ── MEDIA ──────────────────────────────────────────────────────────────────

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ./jellyfin/library:/config
      - ./jellyfin/tvseries:/data/tvshows
      - ./jellyfin/movies:/data/movies
    restart: always
    network_mode: host

  # ── PHOTOS ─────────────────────────────────────────────────────────────────

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ./immich_data:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file: .env
    ports:
      - "2283:2283"
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-database:
        condition: service_healthy
    restart: always

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file: .env
    restart: always

  immich-redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ./immich_data/postgres_data:/var/lib/postgresql/data
    restart: always

  # ── AI / LLM ───────────────────────────────────────────────────────────────

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3006:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_URL}           # e.g. http://<ollama-host>:11434
      - WEBUI_AUTH=false
      - OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./openwebui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:${OLLAMA_HOST_IP}"
    restart: unless-stopped

  mirofish:
    image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file: ./mirofish/.env
    ports:
      - "3010:3000"
      - "5001:5001"
    volumes:
      - ./mirofish/uploads:/app/backend/uploads
    restart: unless-stopped

  # ── AUTOMATION ─────────────────────────────────────────────────────────────

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "8525:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=n8n_redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=10
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/files:/files
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - n8n_redis
    networks:
      - n8n-ollama-network

  n8n_redis:
    image: redis:alpine
    container_name: n8n_redis
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: unless-stopped
    networks:
      - n8n-ollama-network

  postgres:
    image: ankane/pgvector:latest
    container_name: postgres
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./n8n/postgres-data:/var/lib/postgresql/data
    networks:
      - n8n-ollama-network

  # ── SECURITY / PASSWORDS ───────────────────────────────────────────────────

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: Vaultwarden
    environment:
      - TZ=Europe/Berlin
      - WEBSOCKET_ENABLED=true
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      - DISABLE_HTTPS_REDIRECT=true
    volumes:
      - ./vw-data:/data
    ports:
      - "9091:80"
    restart: unless-stopped

  # ── FINANCE ────────────────────────────────────────────────────────────────

  firefly_iii:
    image: fireflyiii/core:latest
    container_name: firefly_iii_core
    networks:
      - firefly_iii
    restart: always
    volumes:
      - ./fireflyIII/firefly_iii_upload:/var/www/html/storage/upload
    env_file: ./fireflyIII/.env
    environment:
      - ENABLE_WEBHOOKS=true
    ports:
      - "8212:8080"
    depends_on:
      - firefly_db

  firefly_db:
    image: mariadb:lts
    container_name: firefly_iii_db
    networks:
      - firefly_iii
    restart: always
    env_file: ./fireflyIII/.db.env
    volumes:
      - ./fireflyIII/firefly_iii_db:/var/lib/mysql

  # ── BOOKMARKS ──────────────────────────────────────────────────────────────

  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    container_name: linkwarden
    env_file: ./linkwarden/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres_link:5432/postgres
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    ports:
      - "3099:3000"
    volumes:
      - ./linkwarden/data:/data/data
    depends_on:
      - postgres_link
      - meilisearch
    restart: always

  postgres_link:
    image: postgres:16-alpine
    env_file: ./linkwarden/.env
    restart: unless-stopped
    volumes:
      - ./linkwarden/pgdata:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.12.8
    restart: always
    env_file: ./linkwarden/.env
    volumes:
      - ./linkwarden/meili_data:/meili_data

  # ── DNS / NETWORK ──────────────────────────────────────────────────────────

  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./adguardhome/work:/opt/adguardhome/work
      - ./adguardhome/conf:/opt/adguardhome/conf
    cap_add:
      - NET_ADMIN

  # ── FILE SYNC & BACKUP ─────────────────────────────────────────────────────

  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ./syncthing/config:/config
      - ./syncthing/data:/data
    restart: unless-stopped

  duplicati:
    image: linuxserver/duplicati:latest
    container_name: duplicati
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - SETTINGS_ENCRYPTION_KEY=${DUPLICATI_ENCRYPTION_KEY}
      - DUPLICATI__WEBSERVICE_PASSWORD=${DUPLICATI_PASSWORD}
    volumes:
      - ./duplicati/config:/config
      - ./:/source
      - ./duplicati/backups:/backups
    ports:
      - "8200:8200"
    restart: unless-stopped

volumes:
  db_data:
  model-cache:

networks:
  n8n-ollama-network:
    external: true
  firefly_iii:
    driver: bridge
